services:
  worker-api:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    environment:
      WORKER_CONFIG: /app/config/worker.yml
      WORKER_ID: ${WORKER_ID}
    volumes:
      - ./config:/app/config:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - worker_work:/var/lib/scanner/work
      - worker_logs:/var/log/scanner
    ports:
      - "127.0.0.1:8001:8001"
    restart: unless-stopped

volumes:
  worker_work:
  worker_logs:
